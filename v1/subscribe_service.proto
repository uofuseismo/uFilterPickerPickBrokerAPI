edition = "2023";

package UFilterPickerPickBrokerAPI.V1;

import "uFilterPickerPickBrokerAPI/v1/pick.proto";
import "uFilterPickerPickBrokerAPI/v1/stream_since_request.proto";

/*!
 * Modules interested in picks generated by various instances of the uFilterPicker
 * subscribe to this service.
 */
service SubscribeService {
    /*! 
     * The producer sends its picks to this end point.
     * When finished returns of summary of picks sent.
     */
    rpc StreamSince(StreamSinceRequest ) returns(stream Pick) {}; 
}
